name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Optional release signing. Add these repository secrets to sign with a
      # real key; without them the APK is debug-signed (still installable).
      #   KEYSTORE_B64      base64 of the .jks/.keystore file
      #   KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
      # (secrets are not readable in step `if:` conditions, so the check lives
      # in the shell.)
      - name: Configure signing
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "No signing secrets configured — APK will be debug-signed."
            exit 0
          fi
          printf '%s' "$KEYSTORE_B64" | base64 -d > release.keystore
          {
            echo "storeFile=release.keystore"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Build
        run: ./gradlew :app:assembleRelease

      - name: Rename APK
        env:
          TAG: ${{ github.ref_name }}
        run: cp app/build/outputs/apk/release/app-release.apk "AppLock-$TAG.apk"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: AppLock-*.apk
          generate_release_notes: true
